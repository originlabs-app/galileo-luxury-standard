commands:
  install: pnpm install
  build: pnpm turbo build
  typecheck: pnpm turbo typecheck
  lint: pnpm turbo lint
  test: pnpm turbo test
  test:e2e: cd apps/dashboard && npx playwright test
  db:push: cd apps/api && pnpm prisma db push
  db:seed: cd apps/api && pnpm prisma db seed
  db:studio: cd apps/api && pnpm prisma studio

services:
  postgres:
    start: echo "PostgreSQL already running via Homebrew on port 5432"
    stop: echo "Do not stop system PostgreSQL"
    healthcheck: psql -h localhost -p 5432 -c "SELECT 1" postgres
    port: 5432
    depends_on: []

  api:
    start: cd apps/api && PORT=4000 pnpm dev
    stop: lsof -ti :4000 | xargs kill -9 2>/dev/null || true
    healthcheck: curl -sf http://localhost:4000/health
    port: 4000
    depends_on: [postgres]

  dashboard:
    start: cd apps/dashboard && PORT=3000 pnpm dev
    stop: lsof -ti :3000 | xargs kill -9 2>/dev/null || true
    healthcheck: curl -sf http://localhost:3000
    port: 3000
    depends_on: [api]

  scanner:
    start: cd apps/scanner && PORT=3001 pnpm dev
    stop: lsof -ti :3001 | xargs kill -9 2>/dev/null || true
    healthcheck: curl -sf http://localhost:3001
    port: 3001
    depends_on: []
