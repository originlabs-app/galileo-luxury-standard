name: Release

on:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Create Release PR or Tag
        id: changesets
        uses: changesets/action@v1
        with:
          title: 'chore: version packages'
          commit: 'chore: version packages'
          publish: pnpm changeset tag
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate blog post from release notes
        if: steps.changesets.outputs.published == 'true'
        env:
          PUBLISHED_PACKAGES: ${{ steps.changesets.outputs.publishedPackages }}
        run: |
          set -euo pipefail

          DATE=$(date -u +%Y-%m-%d)
          VERSION=$(echo "$PUBLISHED_PACKAGES" | node -e "
            const data = JSON.parse(require('fs').readFileSync('/dev/stdin','utf8'));
            const pkg = Array.isArray(data) ? data[0] : data;
            console.log(pkg.version || 'unknown');
          " 2>/dev/null || echo "unknown")

          SLUG="${DATE}-release-v${VERSION}"
          FILE="website/content/blog/${SLUG}.mdx"

          # Extract the latest release entry from CHANGELOG.md
          CHANGES=$(node -e "
            const fs = require('fs');
            const changelog = fs.readFileSync('CHANGELOG.md', 'utf8');
            const match = changelog.match(/## \[[\d.]+\][^\n]*\n([\s\S]*?)(?=\n## \[|$)/);
            if (match) {
              const lines = match[1].trim().split('\n')
                .filter(l => l.trim())
                .slice(0, 12)
                .join('\n');
              console.log(lines);
            } else {
              console.log('- Improvements and bug fixes across the platform.');
            }
          " 2>/dev/null || echo "- Improvements and bug fixes across the platform.")

          # Build a short excerpt from the first meaningful change line
          FIRST_CHANGE=$(echo "$CHANGES" | grep -E '^\*\*|- \*\*|^- ' | head -1 | sed 's/^[#*\-]* *//' | sed 's/\*\*//g' | cut -c1-120)
          EXCERPT="Galileo Protocol v${VERSION} is out. ${FIRST_CHANGE}"

          cat > "$FILE" << MDXEOF
          ---
          title: "Galileo Protocol v${VERSION}"
          date: "${DATE}"
          author: "Galileo Core Team"
          excerpt: "${EXCERPT}"
          tags:
            - release
          published: true
          ---

          Galileo Protocol **v${VERSION}** is now available. Here is what changed in this release.

          ## What's new

          ${CHANGES}

          ## Upgrading

          Pull the latest changes from the repository. If you are running a self-hosted instance, review the [upgrade guide](https://galileoprotocol.io/docs/upgrading) for any migration steps required before restarting.

          ## Get involved

          Galileo Protocol is open source. If you find an issue, have a feature request, or want to contribute, we welcome pull requests and discussions on [GitHub](https://github.com/galileo-protocol/galileo).

          ---

          *Full release diff available on [GitHub Releases](https://github.com/galileo-protocol/galileo/releases/tag/v${VERSION}).*
          MDXEOF

          # Remove the heredoc indentation (10 spaces from shell indentation)
          sed -i 's/^          //' "$FILE"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "$FILE"
          git commit -m "docs(blog): release notes for v${VERSION}"
          git push
